<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tipovačka MS 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;padding:20px}
.container{max-width:1200px;margin:0 auto}
.header{text-align:center;margin-bottom:30px}
.header h1{font-size:2.5rem;background:linear-gradient(135deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
.header p{color:#94a3b8}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:30px}
.stat-card{background:#1e293b;padding:20px;border-radius:12px;border:1px solid #334155}
.stat-label{font-size:0.85rem;color:#94a3b8;margin-bottom:5px}
.stat-value{font-size:2rem;font-weight:bold;color:#3b82f6}
.tabs{display:flex;gap:10px;margin-bottom:20px;border-bottom:2px solid #334155;flex-wrap:wrap}
.tab{padding:12px 24px;background:none;border:none;color:#94a3b8;cursor:pointer;font-size:1rem;border-bottom:3px solid transparent;margin-bottom:-2px}
.tab.active{color:#3b82f6;border-bottom-color:#3b82f6}
.tab-content{display:none}
.tab-content.active{display:block}
table{width:100%;border-collapse:collapse;background:#1e293b;border-radius:12px;overflow:hidden}
th{background:#0f172a;padding:15px;text-align:left;font-weight:600;color:#94a3b8}
td{padding:15px;border-top:1px solid #334155}
tr:hover{background:#0f172a}
.badge{display:inline-block;padding:4px 8px;border-radius:4px;font-size:0.8rem;font-weight:600}
.badge-leader{background:#16a34a;color:white}
.match-row{display:flex;justify-content:space-between;align-items:center;padding:15px;background:#1e293b;margin-bottom:10px;border-radius:8px;border:1px solid #334155}
.match-name{flex:1;font-weight:500}
.match-result{padding:6px 12px;background:#16a34a;border-radius:6px;font-weight:bold}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🏆 Tipovačka MS 2026</h1>
    <p>Aktualizováno: 24.6.2026 · 49 z 72 zápasů odehráno</p>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">VEDOUCÍ</div>
      <div class="stat-value">Štěpán & Vosa</div>
      <div style="color:#94a3b8;font-size:0.9rem;margin-top:5px">31 bodů</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">ÚSPĚŠNOST</div>
      <div class="stat-value">63%</div>
      <div style="color:#94a3b8;font-size:0.9rem;margin-top:5px">31/49 tipů</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">ODEHRÁNO</div>
      <div class="stat-value">49</div>
      <div style="color:#94a3b8;font-size:0.9rem;margin-top:5px">z 72 zápasů</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">NÁSKOK V ČELE</div>
      <div class="stat-value">1</div>
      <div style="color:#94a3b8;font-size:0.9rem;margin-top:5px">bod před Bráchou</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('table')">Tabulka</button>
    <button class="tab" onclick="showTab('matches')">Odehrané zápasy</button>
  </div>

  <div id="table-tab" class="tab-content active">
    <table>
      <thead>
        <tr><th>#</th><th>Hráč</th><th>Body</th><th>Přesné</th><th>1X2</th></tr>
      </thead>
      <tbody id="leaderboard"></tbody>
    </table>
  </div>

  <div id="matches-tab" class="tab-content">
    <div id="matches-list"></div>
  </div>
</div>

<script>
const PLAYERS = {
  "Štěpán": {points: 31, exact: 11, winner: 9},
  "Vosa": {points: 31, exact: 11, winner: 9},
  "Brácha": {points: 30, exact: 10, winner: 10},
  "Vojta": {points: 29, exact: 10, winner: 9},
  "Andy": {points: 28, exact: 10, winner: 8},
  "Kulča": {points: 28, exact: 9, winner: 10},
  "Hejk": {points: 27, exact: 9, winner: 9},
  "Příba": {points: 27, exact: 8, winner: 11},
  "Janča": {points: 26, exact: 9, winner: 8},
  "Míňa": {points: 26, exact: 9, winner: 8},
  "Bochy": {points: 25, exact: 8, winner: 9},
  "Árčí": {points: 25, exact: 8, winner: 9},
  "Kamča": {points: 25, exact: 8, winner: 9},
  "Smůťa": {points: 24, exact: 8, winner: 8},
  "Vráťa": {points: 22, exact: 7, winner: 8},
  "Šimon": {points: 22, exact: 7, winner: 8}
};

const RESULTS = {
  "Bosna a Hercegovina - Katar": "1:1"
};

function renderTable(){
  const sorted = Object.entries(PLAYERS).map(([name, data]) => ({name, ...data}))
    .sort((a,b) => b.points - a.points);
  
  document.getElementById('leaderboard').innerHTML = sorted.map((p,i) => `
    <tr>
      <td>${i+1}</td>
      <td>${p.name} ${i<2 ? '<span class="badge badge-leader">TOP</span>' : ''}</td>
      <td><strong>${p.points}</strong></td>
      <td>${p.exact}</td>
      <td>${p.winner}</td>
    </tr>
  `).join('');
}

function renderMatches(){
  document.getElementById('matches-list').innerHTML = Object.entries(RESULTS).map(([match, result]) => `
    <div class="match-row">
      <div class="match-name">${match}</div>
      <div class="match-result">${result}</div>
    </div>
  `).join('');
}

function showTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(tab+'-tab').classList.add('active');
}

renderTable();
renderMatches();
</script>
</body>
</html>
